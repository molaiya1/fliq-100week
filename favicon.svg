<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <!-- Navy rounded square background -->
  <rect width="32" height="32" rx="7" fill="#1F3C88"/>

  <!-- Subtle head/body silhouette -->
  <ellipse cx="16" cy="13" rx="9" ry="8" fill="#162E6E"/>
  <ellipse cx="16" cy="22" rx="7" ry="5" fill="#162E6E"/>

  <!-- Left eye — gold ring with dark pupil and white catchlight -->
  <circle cx="11.5" cy="14" r="5" fill="#F4B223"/>
  <circle cx="11.5" cy="14" r="2.6" fill="#0B1B38"/>
  <circle cx="13"   cy="12.4" r="1.1" fill="rgba(255,255,255,0.75)"/>

  <!-- Right eye — gold ring with dark pupil and white catchlight -->
  <circle cx="20.5" cy="14" r="5" fill="#F4B223"/>
  <circle cx="20.5" cy="14" r="2.6" fill="#0B1B38"/>
  <circle cx="22"   cy="12.4" r="1.1" fill="rgba(255,255,255,0.75)"/>

  <!-- Beak — small downward triangle between and below eyes -->
  <polygon points="14.8,18 17.2,18 16,20.5" fill="#F4B223"/>
</svg>
