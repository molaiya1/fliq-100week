<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The $100 Week™ — WealthWise Kids</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1B2A4A;
      --cyan:   #00B4D8;
      --gold:   #F5A623;
      --purple: #6C3A9E;
      --green:  #2E7D32;
      --red:    #C62828;
      --gray:   #4A4A4A;
      --light:  #F7F9FC;
      --white:  #FFFFFF;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f1b35 0%, #1B2A4A 60%, #0d2233 100%);
      min-height: 100vh;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 24px 0 8px;
      width: 100%;
      max-width: 700px;
    }
    .header .brand {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 6px;
      opacity: 0.85;
    }
    .header h1 {
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 800;
      color: var(--white);
    }
    .header h1 span { color: var(--gold); }

    /* ── Balance Bar ── */
    .balance-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 16px 24px;
      margin: 20px 0;
      width: 100%;
      max-width: 700px;
      backdrop-filter: blur(8px);
    }
    .balance-bar .balance-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
    }
    .balance-bar .balance-amount {
      font-size: 32px;
      font-weight: 800;
      color: var(--gold);
    }
    .balance-bar .day-indicator {
      text-align: right;
    }
    .balance-bar .day-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .balance-bar .day-number {
      font-size: 24px;
      font-weight: 700;
      color: var(--cyan);
    }

    /* ── Progress dots ── */
    .progress-dots {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: all 0.3s ease;
    }
    .dot.active { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
    .dot.done   { background: var(--gold); }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 700px;
      backdrop-filter: blur(12px);
      box-shadow: var(--card-shadow);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .day-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .day-tag.temptation   { background: rgba(246,166,35,0.2);  color: var(--gold); }
    .day-tag.social       { background: rgba(108,58,158,0.25); color: #c084fc; }
    .day-tag.unexpected   { background: rgba(198,40,40,0.2);   color: #f87171; }
    .day-tag.opportunity  { background: rgba(0,180,216,0.2);   color: var(--cyan); }
    .day-tag.recovery     { background: rgba(46,125,50,0.2);   color: #86efac; }

    .scenario-title {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .scenario-text {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255,255,255,0.8);
      margin-bottom: 24px;
    }

    .context-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 24px;
    }

    /* ── Choices ── */
    .choices { display: flex; flex-direction: column; gap: 14px; }

    .choice-btn {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 18px 22px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      color: var(--white);
      display: flex;
      align-items: flex-start;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    .choice-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: var(--cyan);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,180,216,0.2);
    }
    .choice-btn:active { transform: translateY(0); }

    .choice-letter {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
      color: var(--cyan);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .choice-content .choice-label {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .choice-content .choice-detail {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
    }
    .choice-content .choice-cost {
      font-size: 13px;
      font-weight: 600;
      margin-top: 4px;
    }
    .choice-cost.spend { color: #f87171; }
    .choice-cost.save  { color: #86efac; }
    .choice-cost.risk  { color: var(--gold); }

    /* ── Outcome card ── */
    .outcome-card {
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .outcome-card.show { display: block; }
    .outcome-card.positive { background: rgba(46,125,50,0.15); border: 1px solid rgba(134,239,172,0.25); }
    .outcome-card.negative { background: rgba(198,40,40,0.12); border: 1px solid rgba(248,113,113,0.25); }
    .outcome-card.neutral  { background: rgba(0,180,216,0.1); border: 1px solid rgba(0,180,216,0.25); }

    .outcome-card .outcome-title {
      font-size: 15px; font-weight: 700; margin-bottom: 6px;
    }
    .outcome-card.positive .outcome-title { color: #86efac; }
    .outcome-card.negative .outcome-title { color: #f87171; }
    .outcome-card.neutral  .outcome-title { color: var(--cyan); }
    .outcome-card .outcome-text {
      font-size: 14px; color: rgba(255,255,255,0.75); line-height: 1.6;
    }

    /* ── Next button ── */
    .next-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--navy) 100%);
      border: none;
      border-radius: 14px;
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      display: none;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }
    .next-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,180,216,0.3); }
    .next-btn.show { display: block; animation: fadeIn 0.3s ease; }

    /* ── Score screen ── */
    .score-screen { text-align: center; }
    .score-screen .profile-badge {
      font-size: 72px;
      margin: 16px 0;
      display: block;
    }
    .score-screen .profile-label {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .score-screen .profile-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      max-width: 480px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }
    .trait-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin: 20px 0;
      text-align: left;
    }
    .trait-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px;
    }
    .trait-card .trait-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
    }
    .trait-card .trait-label {
      font-size: 18px;
      font-weight: 700;
    }
    .trait-label.strong    { color: #86efac; }
    .trait-label.developing { color: var(--gold); }
    .trait-label.emerging  { color: #f87171; }

    .trait-dots {
      display: flex; gap: 5px; margin-top: 6px;
    }
    .trait-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }
    .trait-dot.filled.strong    { background: #86efac; }
    .trait-dot.filled.developing { background: var(--gold); }
    .trait-dot.filled.emerging  { background: #f87171; }

    .play-again-btn {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: rgba(255,255,255,0.7);
      padding: 12px 28px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s;
    }
    .play-again-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ── Join screen ── */
    .join-screen { text-align: center; max-width: 460px; margin: 0 auto; }
    .join-screen .join-title {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .join-screen .join-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .join-input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: var(--white);
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .join-input:focus { border-color: var(--cyan); }
    .join-input::placeholder { color: rgba(255,255,255,0.25); letter-spacing: 1px; font-weight: 400; }

    .start-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold) 0%, #e08a00 100%);
      border: none; border-radius: 14px;
      color: var(--navy);
      font-size: 17px; font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .start-btn:hover { opacity: 0.92; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,166,35,0.4); }

    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: rgba(255,255,255,0.3); font-size: 13px;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
    }

    .solo-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: rgba(255,255,255,0.7);
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .solo-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ── Loading ── */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 40px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(198,40,40,0.15);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 14px;
      color: #f87171;
      margin-top: 12px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      padding: 24px 0;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="brand">WealthWise Kids™</div>
    <h1>The <span>$100</span> Week™</h1>
  </div>

  <!-- MAIN CONTAINER -->
  <div id="app"></div>

  <div class="footer">FLIQ Score™ Platform  ·  © 2026 WealthWise Kids LLC  ·  CONFIDENTIAL</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const API_BASE = 'https://fliq-api-production.up.railway.app';
const PILOT_ORG_ID = '00000000-0000-0000-0000-000000000001';
const SIMULATION_ID = 'sim_100week_v1';
const STARTING_BALANCE = 100;

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let state = {
  screen: 'join',       // join | sim | score
  studentId: null,
  sessionId: null,
  balance: STARTING_BALANCE,
  day: 1,
  priorImpulsiveCount: 0,
  history: [],          // { day, choice, balanceBefore, balanceAfter }
  profile: null,
  sessionStart: null,
};

// ══════════════════════════════════════════════════════════════
// SCENARIO DATA
// ══════════════════════════════════════════════════════════════
function getScenarios() {
  const b = state.balance;
  const pct = (b / STARTING_BALANCE) * 100;

  return [
    // ── DAY 1 — Temptation ──────────────────────────────────
    {
      day: 1,
      tag: 'temptation',
      tagLabel: 'Day 1 — Temptation',
      title: 'The Fresh Kicks Drop',
      text: `It's Monday morning and your friend just texted you. The new limited-edition sneakers you've been wanting just dropped online — $80. You have exactly $100 for the whole week. Rent for your room is due Friday. So is your phone bill.`,
      contextPill: `💰 Your balance: $${b}`,
      choices: [
        {
          letter: 'A',
          label: 'Buy the sneakers now',
          detail: 'Get them before they sell out. You\'ll figure out the rest of the week.',
          costLabel: '− $80',
          costType: 'spend',
          cost: 80,
          optionType: 'spend_nonessential',
        },
        {
          letter: 'B',
          label: 'Wait — save your money',
          detail: 'They might restock. Your bills come first.',
          costLabel: 'Keep $100',
          costType: 'save',
          cost: 0,
          optionType: 'save',
        },
      ],
      getOutcome: (choice) => {
        if (choice === 0) return {
          type: 'negative',
          title: 'You got the sneakers.',
          text: 'They look incredible. But you\'ve got $20 left for the entire week — rent and phone bill still pending. This week just got a lot tighter.',
        };
        return {
          type: 'positive',
          title: 'You held off.',
          text: 'Your $100 is intact. You\'ve got room to handle whatever comes next. Smart.',
        };
      },
    },

    // ── DAY 2 — Social Pressure ──────────────────────────────
    {
      day: 2,
      tag: 'social',
      tagLabel: 'Day 2 — Social Pressure',
      title: 'Everyone\'s Going Out',
      text: `Your whole friend group is going to an escape room tonight — $30 per person. The group chat is blowing up. "You coming?" "Don't be lame." Your balance is $${b}.${b < 40 ? ' You know your bills are still due.' : ''}`,
      contextPill: `💰 Your balance: $${b}${b < 40 ? ' ⚠️ Bills still due' : ''}`,
      choices: [
        {
          letter: 'A',
          label: 'Go with the group',
          detail: b < 40 ? 'Spend $30 even though you\'re tight. At least you\'re not missing out.' : 'Spend $30. You can afford it.',
          costLabel: '− $30',
          costType: 'spend',
          cost: 30,
          optionType: b < 40 ? 'spend_social' : 'spend_social',
        },
        {
          letter: 'B',
          label: 'Skip it this time',
          detail: b < 40 ? 'You\'re too tight right now. Protect what you have left.' : 'Save the $30 for something more important.',
          costLabel: 'Keep $' + b,
          costType: 'save',
          cost: 0,
          optionType: b < 40 ? 'decline_social' : 'decline_social',
        },
      ],
      getOutcome: (choice) => {
        if (choice === 0 && b < 40) return {
          type: 'negative',
          title: 'You went out.',
          text: `You had fun — but now you have $${b - 30} left. Your bills are still coming. This could get really difficult.`,
        };
        if (choice === 0) return {
          type: 'neutral',
          title: 'You went out.',
          text: `You spent $30. Your balance is $${b - 30}. Still manageable — but keep an eye on it.`,
        };
        return {
          type: 'positive',
          title: 'You skipped it.',
          text: b < 40 ? `Smart call. With $${b} left, protecting your money was the right move.` : `Your $${b} is safe. A little FOMO now, a lot more peace later.`,
        };
      },
    },

    // ── DAY 3 — Unexpected Event ─────────────────────────────
    {
      day: 3,
      tag: 'unexpected',
      tagLabel: 'Day 3 — Unexpected',
      title: 'Your Phone Screen Cracked',
      text: `You dropped your phone on concrete. The screen cracked and it's barely usable. The cheapest fix is $25 at the repair shop down the street. You need your phone for work messages. Your balance is $${b}.`,
      contextPill: `💰 Your balance: $${b}`,
      choices: [
        {
          letter: 'A',
          label: `Pay the $25 repair`,
          detail: b >= 25 ? 'You have enough. Fix it and keep moving.' : 'You don\'t have enough. You\'ll have to borrow it.',
          costLabel: b >= 25 ? '− $25' : 'Need to borrow',
          costType: b >= 25 ? 'spend' : 'spend',
          cost: b >= 25 ? 25 : 0,
          optionType: 'spend_essential',
        },
        {
          letter: 'B',
          label: 'Deal with the cracked screen',
          detail: 'Tough it out. You can\'t afford to spend more right now.',
          costLabel: b >= 25 ? 'Keep $' + b : 'Keep $' + b,
          costType: 'save',
          cost: 0,
          optionType: 'save',
        },
      ],
      getOutcome: (choice) => {
        if (choice === 0 && b < 25) return {
          type: 'negative',
          title: 'You couldn\'t cover it.',
          text: `Your balance was too low. This is what happens when early spending leaves no buffer. You had to borrow — which means next week starts in the red.`,
        };
        if (choice === 0) return {
          type: 'neutral',
          title: 'Fixed.',
          text: `$25 gone, but the problem is solved. Your balance is $${b - 25}. You had the buffer — that\'s planning.`,
        };
        return {
          type: 'negative',
          title: 'Toughing it out.',
          text: `You kept the money, but a cracked screen affects everything. Sometimes the "save" choice creates other costs.`,
        };
      },
    },

    // ── DAY 4 — Opportunity ──────────────────────────────────
    {
      day: 4,
      tag: 'opportunity',
      tagLabel: 'Day 4 — Opportunity',
      title: 'The Investment Question',
      text: `Your coworker is selling pre-orders for a product that could double in value — or flop entirely. It's a $20 buy-in, and the results come in next week. It's real risk. It could return $40. Or nothing. Your balance is $${b}.`,
      contextPill: `💰 Your balance: $${b} · 50/50 chance`,
      choices: [
        {
          letter: 'A',
          label: 'Invest $20',
          detail: b > 60 ? 'You\'re resourced. A calculated risk when you can absorb the loss.' : 'High risk when you\'re already tight. Could leave you with nothing.',
          costLabel: '− $20 (maybe +$40)',
          costType: 'risk',
          cost: 20,
          optionType: 'invest',
        },
        {
          letter: 'B',
          label: 'Pass on it',
          detail: b < 40 ? 'With your balance this low, protecting what you have is the right call.' : 'Not every opportunity is worth taking.',
          costLabel: 'Keep $' + b,
          costType: 'save',
          cost: 0,
          optionType: 'decline_invest',
        },
      ],
      getOutcome: (choice) => {
        if (choice === 0 && b > 60) return {
          type: 'positive',
          title: 'A thoughtful risk.',
          text: `You had the resources to absorb the downside. Whether it pays off or not, this was an informed decision — not recklessness.`,
        };
        if (choice === 0 && state.priorImpulsiveCount >= 2) return {
          type: 'negative',
          title: 'Risk on top of risk.',
          text: `After a week of tight decisions, adding more uncertainty is a red flag. You invested $20 you may not be able to spare.`,
        };
        if (choice === 0) return {
          type: 'neutral',
          title: 'You took the bet.',
          text: `A $20 risk with $${b} in your pocket. The outcome isn\'t known yet — but you made a choice. Was it informed?`,
        };
        if (b < 40) return {
          type: 'positive',
          title: 'Smart pass.',
          text: `With $${b} left, protecting your resources was the right call. Caution when constrained is strength, not fear.`,
        };
        return {
          type: 'neutral',
          title: 'You passed.',
          text: `Not every opportunity needs to be taken. You kept $${b} safe. Whether that was the right call depends on what comes next.`,
        };
      },
    },

    // ── DAY 5 — Recovery ─────────────────────────────────────
    {
      day: 5,
      tag: 'recovery',
      tagLabel: 'Day 5 — Recovery',
      title: 'End of the Week',
      text: `It\'s Friday. You can see exactly how the week played out. Your balance is $${b}.${b < 30 ? ' That\'s below where you need to be.' : b >= 60 ? ' You managed this week well.' : ' You got through it.'}  There\'s a sale happening — things you don\'t need but kind of want. What do you do with what you have left?`,
      contextPill: `💰 Final balance: $${b}${b < 30 ? ' ⚠️ Low' : b >= 60 ? ' ✅ Strong' : ''}`,
      choices: [
        {
          letter: 'A',
          label: b < 30 ? 'Keep spending — one more thing' : 'Treat yourself a little',
          detail: b < 30 ? 'Same pattern as earlier in the week, even after a rough run.' : 'You\'ve earned it. Spend a little on yourself.',
          costLabel: '− $20',
          costType: 'spend',
          cost: 20,
          optionType: 'spend_nonessential',
        },
        {
          letter: 'B',
          label: b < 30 ? 'Stop. Protect what\'s left.' : 'Save it for next week',
          detail: b < 30 ? 'You recognize the pattern and pull back. That\'s recovery.' : 'Build the buffer. Next week starts stronger.',
          costLabel: 'Keep $' + b,
          costType: 'save',
          cost: 0,
          optionType: b < 30 ? 'save' : 'save',
        },
      ],
      getOutcome: (choice) => {
        if (choice === 0 && b < 30) return {
          type: 'negative',
          title: 'Same pattern.',
          text: `Even with a low balance and a rough week behind you, you spent again. The week ends the same way it started.`,
        };
        if (choice === 0) return {
          type: 'neutral',
          title: 'You spent a little.',
          text: `You had the room. $${b - 20} remains. Not a bad week overall — but next week starts a little tighter.`,
        };
        if (b < 30) return {
          type: 'positive',
          title: 'You pulled back.',
          text: `That\'s the recovery signal. You recognized what was happening and changed course. That\'s one of the hardest things to do — and you did it.`,
        };
        return {
          type: 'positive',
          title: 'Strong finish.',
          text: `$${b} going into next week. You ended with a buffer. That\'s what planning looks like in practice.`,
        };
      },
    },
  ];
}

// ══════════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════════
async function apiPost(path, body) {
  try {
    const res = await fetch(`${API_BASE}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return res.ok ? await res.json() : null;
  } catch (e) {
    console.warn('[API]', e);
    return null;
  }
}

async function createStudent() {
  const data = await apiPost('/students', {
    org_id: PILOT_ORG_ID,
    age_band: '13-17',
    grade: 'mixed',
  });
  return data?.student_id || null;
}

async function startSession(studentId) {
  const data = await apiPost('/sessions', {
    student_id: studentId,
    simulation_id: SIMULATION_ID,
    delivery_mode: 'web_classroom',
    pilot_instance: 'tcof_pilot_1',
  });
  return data?.session_id || null;
}

async function recordEvent(choice, scenario) {
  if (!state.sessionId) return;
  const balBefore = (state.history.length === 0
    ? STARTING_BALANCE
    : state.history[state.history.length - 1].balanceAfter);

  const cost = scenario.choices[choice].cost;
  const balAfter = Math.max(0, balBefore - cost);
  const balPctBefore = Math.round((balBefore / STARTING_BALANCE) * 100);
  const balPctAfter  = Math.round((balAfter  / STARTING_BALANCE) * 100);

  await apiPost('/events', {
    session_id: state.sessionId,
    student_id: state.studentId,
    scenario_round: scenario.day,
    simulation_id: SIMULATION_ID,
    option_selected: String.fromCharCode(65 + choice),
    time_to_decision_ms: state._choiceStartTime ? (Date.now() - state._choiceStartTime) : null,
    mind_changed: false,
    state_snapshot: {
      day: scenario.day,
      option_type: scenario.choices[choice].optionType,
      balance_pct_before: balPctBefore,
      balance_pct_after: balPctAfter,
      prior_impulsive_count: state.priorImpulsiveCount,
      low_balance_warning_shown: balBefore < 30,
    },
    presented_options: scenario.choices.map(c => c.optionType),
  });
}

async function completeSession() {
  if (!state.sessionId) return null;
  const duration = state.sessionStart ? Math.round((Date.now() - state.sessionStart) / 1000) : null;
  const data = await apiPost(`/sessions/${state.sessionId}/complete`, { duration_seconds: duration });
  return data;
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
const app = document.getElementById('app');

function render() {
  if (state.screen === 'join')  return renderJoin();
  if (state.screen === 'sim')   return renderSim();
  if (state.screen === 'score') return renderScore();
  if (state.screen === 'loading') return renderLoading();
}

function renderJoin() {
  app.innerHTML = `
    <div class="card join-screen">
      <div class="join-title">Ready to take<br>the challenge?</div>
      <div class="join-sub">
        You have $100. Five days. Real decisions.<br>
        How you handle it reveals how your financial mind works.
      </div>
      <input class="join-input" id="codeInput" type="text" maxlength="6"
        placeholder="Enter session code" autocomplete="off" spellcheck="false" />
      <div class="error-msg" id="codeError">That code doesn't match a session. Try again.</div>
      <button class="start-btn" onclick="joinWithCode()">Join Session</button>
      <div class="or-divider">or</div>
      <button class="solo-btn" onclick="startSolo()">Play on your own</button>
    </div>
  `;
}

function renderLoading() {
  app.innerHTML = `
    <div class="card">
      <div class="loading">
        <div class="spinner"></div>
        <div style="color:rgba(255,255,255,0.6);font-size:14px;">Setting up your session…</div>
      </div>
    </div>
  `;
}

function renderSim() {
  const scenarios = getScenarios();
  const scenario  = scenarios[state.day - 1];

  const progressDots = [1,2,3,4,5].map(d => {
    const cls = d < state.day ? 'dot done' : d === state.day ? 'dot active' : 'dot';
    return `<div class="${cls}"></div>`;
  }).join('');

  const choicesHtml = scenario.choices.map((c, i) => `
    <button class="choice-btn" onclick="makeChoice(${i})">
      <div class="choice-letter">${c.letter}</div>
      <div class="choice-content">
        <div class="choice-label">${c.label}</div>
        <div class="choice-detail">${c.detail}</div>
        <div class="choice-cost ${c.costType}">${c.costLabel}</div>
      </div>
    </button>
  `).join('');

  app.innerHTML = `
    <div class="balance-bar">
      <div>
        <div class="balance-label">Your Balance</div>
        <div class="balance-amount" id="balanceDisplay">$${state.balance}</div>
      </div>
      <div class="day-indicator">
        <div class="day-label">Day</div>
        <div class="day-number">${state.day} / 5</div>
      </div>
    </div>

    <div class="progress-dots">${progressDots}</div>

    <div class="card" id="simCard">
      <div class="day-tag ${scenario.tag}">${scenario.tagLabel}</div>
      <div class="scenario-title">${scenario.title}</div>
      <div class="scenario-text">${scenario.text}</div>
      <div class="context-pill">${scenario.contextPill}</div>

      <div class="outcome-card" id="outcomeCard">
        <div class="outcome-title" id="outcomeTitle"></div>
        <div class="outcome-text" id="outcomeText"></div>
      </div>

      <div class="choices" id="choicesContainer">
        ${choicesHtml}
      </div>

      <button class="next-btn" id="nextBtn" onclick="nextDay()">
        ${state.day < 5 ? 'Continue to Day ' + (state.day + 1) + ' →' : 'See My FLIQ Profile →'}
      </button>
    </div>
  `;

  // Start timing for this decision
  state._choiceStartTime = Date.now();
}

function renderScore() {
  const p = state.profile;
  if (!p) {
    app.innerHTML = `<div class="card score-screen">
      <div class="profile-badge">✅</div>
      <div class="profile-label">Week Complete</div>
      <div class="profile-sub">Your session has been recorded. Your educator will share your results.</div>
    </div>`;
    return;
  }

  const badges = {
    'Financial Starter': '🌱', 'Explorer': '🔭',
    'Builder': '🏗️', 'Thinker': '💡',
    'Emerging': '🌱', 'Developing': '🔭', 'Advancing': '🏗️',
    'Leading': '💡', 'Exceptional': '🌟',
  };

  const badge = badges[p.profile_label] || '✨';

  const traits = [
    { id: 'ic', name: 'Impulse Control', ...p.traits?.ic },
    { id: 'po', name: 'Planning',        ...p.traits?.po },
    { id: 'ra', name: 'Risk Awareness',  ...p.traits?.ra },
    { id: 'rb', name: 'Recovery',        ...p.traits?.rb },
  ];

  const traitCards = traits.map(t => {
    const label = t.label || 'Emerging';
    const cls   = label.toLowerCase().replace(' ', '-');
    const score = t.score ?? 0;
    const dots  = [0,1,2].map(i =>
      `<div class="trait-dot ${i < score ? `filled ${cls}` : ''}"></div>`
    ).join('');
    return `
      <div class="trait-card">
        <div class="trait-name">${t.name}</div>
        <div class="trait-label ${cls}">${label}</div>
        <div class="trait-dots">${dots}</div>
      </div>`;
  }).join('');

  const profileDescriptions = {
    'Financial Starter': 'You\'re at the beginning of your financial intelligence journey. Every expert started here.',
    'Explorer':  'You\'re building awareness. Some strong instincts are showing — keep going.',
    'Builder':   'Your financial thinking is solid. You balance risk, patience, and recovery well.',
    'Thinker':   'You make intentional, context-aware financial decisions. That\'s rare.',
    'Developing': 'You\'re building awareness. Some strong instincts are showing — keep going.',
    'Advancing': 'Your financial thinking is solid. You balance risk, patience, and recovery well.',
  };

  app.innerHTML = `
    <div class="card score-screen">
      <div style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:8px;">Your FLIQ Profile</div>
      <div class="profile-badge">${badge}</div>
      <div class="profile-label">${p.profile_label}</div>
      <div class="profile-sub">${profileDescriptions[p.profile_label] || 'Your behavioral intelligence profile has been recorded.'}</div>

      <div class="trait-grid">${traitCards}</div>

      <div style="font-size:12px;color:rgba(255,255,255,0.3);margin-top:16px;line-height:1.6;">
        Your full behavioral report is available to your educator.<br>
        This is just the beginning — your profile builds over time.
      </div>

      <button class="play-again-btn" onclick="resetAndPlay()">Play Again</button>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════════════
async function startSolo() {
  state.screen = 'loading';
  render();

  const studentId = await createStudent();
  const sessionId = studentId ? await startSession(studentId) : null;

  state.studentId = studentId;
  state.sessionId = sessionId;
  state.balance   = STARTING_BALANCE;
  state.day       = 1;
  state.priorImpulsiveCount = 0;
  state.history   = [];
  state.sessionStart = Date.now();
  state.screen    = 'sim';
  render();
}

async function joinWithCode() {
  // For v1, code join is treated the same as solo — code is cosmetic for classroom context
  // Future: look up cohort session by code
  const code = document.getElementById('codeInput')?.value?.trim();
  if (!code || code.length < 4) {
    const err = document.getElementById('codeError');
    if (err) err.classList.add('show');
    return;
  }
  await startSolo();
}

async function makeChoice(choiceIndex) {
  const scenarios = getScenarios();
  const scenario  = scenarios[state.day - 1];

  // Disable buttons
  const container = document.getElementById('choicesContainer');
  if (container) container.style.pointerEvents = 'none';

  // Highlight selected
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((b, i) => {
    if (i === choiceIndex) {
      b.style.borderColor = '#00B4D8';
      b.style.background  = 'rgba(0,180,216,0.12)';
    } else {
      b.style.opacity = '0.4';
    }
  });

  // Track impulsive behavior
  const optType = scenario.choices[choiceIndex].optionType;
  const isImpulsive = ['spend_nonessential', 'spend_social'].includes(optType)
    && (state.balance / STARTING_BALANCE) < 0.4;
  if (isImpulsive) state.priorImpulsiveCount++;

  // Update balance
  const cost = scenario.choices[choiceIndex].cost;
  const newBalance = Math.max(0, state.balance - cost);

  // Record event
  await recordEvent(choiceIndex, scenario);

  // Update state
  state.history.push({
    day: state.day,
    choice: choiceIndex,
    balanceBefore: state.balance,
    balanceAfter: newBalance,
  });
  state.balance = newBalance;

  // Update balance display
  const balDisplay = document.getElementById('balanceDisplay');
  if (balDisplay) balDisplay.textContent = `$${state.balance}`;

  // Show outcome
  const outcome = scenario.getOutcome(choiceIndex);
  const outcomeCard = document.getElementById('outcomeCard');
  const outcomeTitle = document.getElementById('outcomeTitle');
  const outcomeText  = document.getElementById('outcomeText');
  if (outcomeCard && outcome) {
    outcomeCard.className = `outcome-card show ${outcome.type}`;
    outcomeTitle.textContent = outcome.title;
    outcomeText.textContent  = outcome.text;
    outcomeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Show next button
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.classList.add('show');
}

async function nextDay() {
  if (state.day >= 5) {
    // Complete session
    state.screen = 'loading';
    render();
    const result = await completeSession();
    state.profile = result;
    state.screen  = 'score';
    render();
  } else {
    state.day++;
    state.screen = 'sim';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function resetAndPlay() {
  state.screen   = 'join';
  state.studentId = null;
  state.sessionId = null;
  state.balance  = STARTING_BALANCE;
  state.day      = 1;
  state.priorImpulsiveCount = 0;
  state.history  = [];
  state.profile  = null;
  render();
}

// INIT

render();
</script>
