<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The $100 Week™ — WealthWise Kids</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1B2A4A;
      --cyan:   #00B4D8;
      --gold:   #F5A623;
      --purple: #6C3A9E;
      --green:  #2E7D32;
      --red:    #C62828;
      --gray:   #4A4A4A;
      --light:  #F7F9FC;
      --white:  #FFFFFF;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f1b35 0%, #1B2A4A 60%, #0d2233 100%);
      min-height: 100vh;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 24px 0 8px;
      width: 100%;
      max-width: 700px;
    }
    .header .brand {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 6px;
      opacity: 0.85;
    }
    .header h1 {
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 800;
      color: var(--white);
    }
    .header h1 span { color: var(--gold); }

    /* ── Balance Bar ── */
    .balance-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 16px 24px;
      margin: 20px 0;
      width: 100%;
      max-width: 700px;
      backdrop-filter: blur(8px);
    }
    .balance-bar .balance-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
    }
    .balance-bar .balance-amount {
      font-size: 32px;
      font-weight: 800;
      color: var(--gold);
    }
    .balance-bar .day-indicator {
      text-align: right;
    }
    .balance-bar .day-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .balance-bar .day-number {
      font-size: 24px;
      font-weight: 700;
      color: var(--cyan);
    }

    /* ── Progress dots ── */
    .progress-dots {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: all 0.3s ease;
    }
    .dot.active { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
    .dot.done   { background: var(--gold); }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 700px;
      backdrop-filter: blur(12px);
      box-shadow: var(--card-shadow);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .day-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .day-tag.temptation   { background: rgba(246,166,35,0.2);  color: var(--gold); }
    .day-tag.social       { background: rgba(108,58,158,0.25); color: #c084fc; }
    .day-tag.unexpected   { background: rgba(198,40,40,0.2);   color: #f87171; }
    .day-tag.opportunity  { background: rgba(0,180,216,0.2);   color: var(--cyan); }
    .day-tag.recovery     { background: rgba(46,125,50,0.2);   color: #86efac; }

    .scenario-title {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .scenario-text {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255,255,255,0.8);
      margin-bottom: 24px;
    }

    .context-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 24px;
    }

    /* ── Choices ── */
    .choices { display: flex; flex-direction: column; gap: 14px; }

    .choice-btn {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 18px 22px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      color: var(--white);
      display: flex;
      align-items: flex-start;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    .choice-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: var(--cyan);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,180,216,0.2);
    }
    .choice-btn:active { transform: translateY(0); }

    .choice-letter {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
      color: var(--cyan);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .choice-content .choice-label {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .choice-content .choice-detail {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
    }
    .choice-content .choice-cost {
      font-size: 13px;
      font-weight: 600;
      margin-top: 4px;
    }
    .choice-cost.spend { color: #f87171; }
    .choice-cost.save  { color: #86efac; }
    .choice-cost.risk  { color: var(--gold); }

    /* ── Outcome card ── */
    .outcome-card {
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .outcome-card.show { display: block; }
    .outcome-card.positive { background: rgba(46,125,50,0.15); border: 1px solid rgba(134,239,172,0.25); }
    .outcome-card.negative { background: rgba(198,40,40,0.12); border: 1px solid rgba(248,113,113,0.25); }
    .outcome-card.neutral  { background: rgba(0,180,216,0.1); border: 1px solid rgba(0,180,216,0.25); }

    .outcome-card .outcome-title {
      font-size: 15px; font-weight: 700; margin-bottom: 6px;
    }
    .outcome-card.positive .outcome-title { color: #86efac; }
    .outcome-card.negative .outcome-title { color: #f87171; }
    .outcome-card.neutral  .outcome-title { color: var(--cyan); }
    .outcome-card .outcome-text {
      font-size: 14px; color: rgba(255,255,255,0.75); line-height: 1.6;
    }

    /* ── Next button ── */
    .next-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--navy) 100%);
      border: none;
      border-radius: 14px;
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      display: none;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }
    .next-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,180,216,0.3); }
    .next-btn.show { display: block; animation: fadeIn 0.3s ease; }

    /* ── Score screen ── */
    .score-screen { text-align: center; }
    .score-screen .profile-badge {
      font-size: 72px;
      margin: 16px 0;
      display: block;
    }
    .score-screen .profile-label {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .score-screen .profile-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      max-width: 480px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }
    .trait-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin: 20px 0;
      text-align: left;
    }
    .trait-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px;
    }
    .trait-card .trait-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
    }
    .trait-card .trait-label {
      font-size: 18px;
      font-weight: 700;
    }
    .trait-label.strong    { color: #86efac; }
    .trait-label.developing { color: var(--gold); }
    .trait-label.emerging  { color: #f87171; }

    .trait-dots {
      display: flex; gap: 5px; margin-top: 6px;
    }
    .trait-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }
    .trait-dot.filled.strong    { background: #86efac; }
    .trait-dot.filled.developing { background: var(--gold); }
    .trait-dot.filled.emerging  { background: #f87171; }

    .play-again-btn {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: rgba(255,255,255,0.7);
      padding: 12px 28px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s;
    }
    .play-again-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ── Join screen ── */
    .join-screen { text-align: center; max-width: 460px; margin: 0 auto; }
    .join-screen .join-title {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .join-screen .join-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .join-input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: var(--white);
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .join-input:focus { border-color: var(--cyan); }
    .join-input::placeholder { color: rgba(255,255,255,0.25); letter-spacing: 1px; font-weight: 400; }

    .start-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold) 0%, #e08a00 100%);
      border: none; border-radius: 14px;
      color: var(--navy);
      font-size: 17px; font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .start-btn:hover { opacity: 0.92; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,166,35,0.4); }

    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: rgba(255,255,255,0.3); font-size: 13px;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
    }

    .solo-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: rgba(255,255,255,0.7);
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .solo-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ── Loading ── */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 40px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(198,40,40,0.15);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 14px;
      color: #f87171;
      margin-top: 12px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      padding: 24px 0;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="brand">WealthWise Kids™</div>
    <h1>The <span>$100</span> Week™</h1>
  </div>

  <!-- MAIN CONTAINER -->
  <div id="app"></div>

  <div class="footer">FLIQ Score™ Platform  ·  © 2026 WealthWise Kids LLC  ·  CONFIDENTIAL</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const API_BASE = 'https://fliq-api-production.up.railway.app';
const PILOT_ORG_ID = '00000000-0000-0000-0000-000000000001';
const SIMULATION_ID = 'sim_100week_v1';
const STARTING_BALANCE = 100;

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let state = {
  screen: 'join',       // join | sim | score
  studentId: null,
  sessionId: null,
  cohortId: null,       // resolved from join code
  balance: STARTING_BALANCE,
  day: 1,
  priorImpulsiveCount: 0,
  history: [],          // { day, choice, balanceBefore, balanceAfter }
  profile: null,
  sessionStart: null,
};

// ══════════════════════════════════════════════════════════════
// SCENARIO DATA
// ══════════════════════════════════════════════════════════════
function getScenarios() {
  const b = state.balance;
  const pct = (b / STARTING_BALANCE) * 100;

  return [
    // ── DAY 1 — Temptation ──────────────────────────────────
    {
      day: 1,
      tag: 'temptation',
      tagLabel: 'Day 1 — Temptation',
      title: 'The Cool Shoes',
      text: `It's Monday. Your friend just texted you. The shoes you really want are on sale — right now. They cost $80. You have $100 for the whole week. You want to save some for later. But these shoes are SO cool.`,
      contextPill: `💰 Your money: $${b}`,
      choices: [
        {
          letter: 'A',
          label: 'Buy the shoes now!',
          detail: 'Get them before they\'re gone. You\'ll figure out the rest later.',
          costLabel: '− $80',
          costType: 'spend',
          cost: 80,
          optionType: 'spend_nonessential',
        },
        {
          letter: 'B',
          label: 'Wait and save my money',
          detail: 'They might come back. Hold on to your money for now.',
          costLabel: 'Keep $100',
          costType: 'save',
          cost: 0,
          optionType: 'save',
        },
      ],
      getOutcome: (choice) => {
        if (choice === 0) return {
          type: 'negative',
          title: 'You got the shoes!',
          text: 'They look amazing. But now you only have $20 left for the whole week. That\'s not much. Things just got harder.',
        };
        return {
          type: 'positive',
          title: 'You waited. Good job!',
          text: 'Your $100 is safe. You still have money for anything that comes up this week. Smart move!',
        };
      },
    },

    // ── DAY 2 — Social Pressure ──────────────────────────────
    {
      day: 2,
      tag: 'social',
      tagLabel: 'Day 2 — Social Pressure',
      title: 'Everyone is Going!',
      text: `Your friends are all going to the movies and the snack bar tonight. It costs $30. Your phone keeps buzzing. "Come on!" "Don't miss it!" "Everyone is going!" Your money is $${b}.${b < 40 ? ' You don\'t have a lot left.' : ''}`,
      contextPill: `💰 Your money: $${b}${b < 40 ? ' ⚠️ Running low!' : ''}`,
      choices: [
        {
          letter: 'A',
          label: 'Go with my friends!',
          detail: b < 40 ? 'Spend $30 even with low money. You don\'t want to miss out.' : 'Spend $30. You can handle it.',
          costLabel: '− $30',
          costType: 'spend',
          cost: 30,
          optionType: b < 40 ? 'spend_social' : 'spend_social',
        },
        {
          letter: 'B',
          label: 'Stay home this time',
          detail: b < 40 ? 'You don\'t have much left. Keep your money safe.' : 'Save the $30 for something you really need.',
          costLabel: 'Keep $' + b,
          costType: 'save',
          cost: 0,
          optionType: b < 40 ? 'decline_social' : 'decline_social',
        },
      ],
      getOutcome: (choice) => {
        if (choice === 0 && b < 40) return {
          type: 'negative',
          title: 'You went — but it cost you.',
          text: `You had fun! But now you only have $${b - 30} left. That\'s really low. The rest of the week is going to be tough.`,
        };
        if (choice === 0) return {
          type: 'neutral',
          title: 'You went out.',
          text: `You had a great time! You spent $30. You have $${b - 30} left. Keep an eye on it.`,
        };
        return {
          type: 'positive',
          title: 'You stayed home.',
          text: b < 40 ? `Good thinking! With only $${b} left, keeping your money was the right call.` : `Your $${b} is still safe. It\'s okay to miss out sometimes. Your money will thank you later.`,
        };
      },
    },

    // ── DAY 3 — Unexpected Event ─────────────────────────────
    {
      day: 3,
      tag: 'unexpected',
      tagLabel: 'Day 3 — Unexpected',
      title: 'Uh Oh. Your Bike Tire Popped.',
      text: `You were riding your bike and — POP! Your tire is flat. You need your bike to get to practice. The bike shop can fix it for $25. You didn\'t plan for this. Your money is $${b}.`,
      contextPill: `💰 Your money: $${b}`,
      choices: [
        {
          letter: 'A',
          label: 'Pay $25 to fix the tire',
          detail: b >= 25 ? 'You have enough. Fix it and get back on your bike.' : 'You don\'t have enough. You\'ll need to ask someone for help.',
          costLabel: b >= 25 ? '− $25' : 'Need to borrow',
          costType: b >= 25 ? 'spend' : 'spend',
          cost: b >= 25 ? 25 : 0,
          optionType: 'spend_essential',
        },
        {
          letter: 'B',
          label: 'Leave the tire flat for now',
          detail: 'Keep your money. You\'ll figure out another way to get there.',
          costLabel: 'Keep $' + b,
          costType: 'save',
          cost: 0,
          optionType: 'save',
        },
      ],
      getOutcome: (choice) => {
        if (choice === 0 && b < 25) return {
          type: 'negative',
          title: 'You didn\'t have enough.',
          text: `Your money was too low to fix it. You had to ask someone to help pay. Spending early in the week made this harder.`,
        };
        if (choice === 0) return {
          type: 'neutral',
          title: 'Tire is fixed!',
          text: `$25 gone — but you solved the problem. Your money is $${b - 25}. You had enough because you planned ahead.`,
        };
        return {
          type: 'negative',
          title: 'You left it flat.',
          text: `You kept your money — but now you can\'t ride your bike. Sometimes not spending causes other problems too.`,
        };
      },
    },

    // ── DAY 4 — Opportunity ──────────────────────────────────
    {
      day: 4,
      tag: 'opportunity',
      tagLabel: 'Day 4 — Opportunity',
      title: 'A Chance to Make More Money',
      text: `Your friend has a plan. If you give them $20, they\'ll try to flip it and give you $40 back by next week. It might work. It might not. It\'s a 50/50 chance. Your money is $${b}.`,
      contextPill: `💰 Your money: $${b} · 50/50 chance`,
      choices: [
        {
          letter: 'A',
          label: 'Give them $20 and try it',
          detail: b > 60 ? 'You have enough to take the chance. If it works, great!' : 'You don\'t have much left. This is risky.',
          costLabel: '− $20 (maybe +$40)',
          costType: 'risk',
          cost: 20,
          optionType: 'invest',
        },
        {
          letter: 'B',
          label: 'No thanks — keep my money',
          detail: b < 40 ? 'You don\'t have much left. Keeping it is the safe choice.' : 'Not every chance is worth taking.',
          costLabel: 'Keep $' + b,
          costType: 'save',
          cost: 0,
          optionType: 'decline_invest',
        },
      ],
      getOutcome: (choice) => {
        if (choice === 0 && b > 60) return {
          type: 'positive',
          title: 'You took a chance!',
          text: `You had enough money to try it. Win or lose, you thought it through first. That\'s smart risk-taking.`,
        };
        if (choice === 0 && state.priorImpulsiveCount >= 2) return {
          type: 'negative',
          title: 'That was risky.',
          text: `After a tough week, putting more money at risk is a tough call. You gave away $20 you might really need.`,
        };
        if (choice === 0) return {
          type: 'neutral',
          title: 'You went for it.',
          text: `You put $20 on the line. You\'ll find out next week. Was it the right call?`,
        };
        if (b < 40) return {
          type: 'positive',
          title: 'Good thinking!',
          text: `With only $${b} left, keeping your money was the right call. Staying safe when you\'re low is a smart move.`,
        };
        return {
          type: 'neutral',
          title: 'You said no.',
          text: `You kept your $${b} safe. Not every chance needs to be taken. Sometimes saying no is the smart play.`,
        };
      },
    },

    // ── DAY 5 — Recovery ─────────────────────────────────────
    {
      day: 5,
      tag: 'recovery',
      tagLabel: 'Day 5 — Recovery',
      title: 'Last Day of the Week!',
      text: `It\'s Friday! The week is almost over. You have $${b} left.${b < 30 ? ' That\'s not much — it was a tough week.' : b >= 60 ? ' You did a great job this week!' : ' You made it through!'} On your way home you pass a store. There\'s a sale on stuff you kind of want. What do you do?`,
      contextPill: `💰 Your money: $${b}${b < 30 ? ' ⚠️ Running low!' : b >= 60 ? ' ✅ Great job!' : ''}`,
      choices: [
        {
          letter: 'A',
          label: b < 30 ? 'Buy one more thing' : 'Treat yourself — you earned it!',
          detail: b < 30 ? 'Keep spending even after a hard week.' : 'You did well. Spend a little on yourself.',
          costLabel: '− $20',
          costType: 'spend',
          cost: 20,
          optionType: 'spend_nonessential',
        },
        {
          letter: 'B',
          label: b < 30 ? 'Stop and save what\'s left' : 'Save it for next week',
          detail: b < 30 ? 'You notice the pattern and stop. That takes courage.' : 'Next week starts stronger with more in your pocket.',
          costLabel: 'Keep $' + b,
          costType: 'save',
          cost: 0,
          optionType: b < 30 ? 'save' : 'save',
        },
      ],
      getOutcome: (choice) => {
        if (choice === 0 && b < 30) return {
          type: 'negative',
          title: 'You kept spending.',
          text: `Even after a tough week, you spent again. The week ends the same way it started. Next time, you\'ll know what to do differently.`,
        };
        if (choice === 0) return {
          type: 'neutral',
          title: 'You treated yourself!',
          text: `You had the money for it. $${b - 20} is left. Not a bad week — but next week starts a little smaller.`,
        };
        if (b < 30) return {
          type: 'positive',
          title: 'You stopped! Great job!',
          text: `You saw the pattern and changed it. That is one of the hardest things to do — and you did it. That\'s what bouncing back looks like.`,
        };
        return {
          type: 'positive',
          title: 'Strong finish!',
          text: `You end the week with $${b}. You saved money when it was hard. That\'s what good planning looks like. Be proud of yourself!`,
        };
      },
    },
  ];
}

// ══════════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════════
async function apiPost(path, body) {
  try {
    const res = await fetch(`${API_BASE}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return res.ok ? await res.json() : null;
  } catch (e) {
    console.warn('[API]', e);
    return null;
  }
}

async function createStudent(cohortId = null) {
  const data = await apiPost('/students', {
    org_id: PILOT_ORG_ID,
    cohort_id: cohortId || undefined,
    age_band: '13-17',
    grade: 'mixed',
  });
  return data?.student_id || null;
}

async function startSession(studentId) {
  const data = await apiPost('/sessions', {
    student_id: studentId,
    simulation_id: SIMULATION_ID,
    delivery_mode: 'web_classroom',
    pilot_instance: 'tcof_pilot_1',
  });
  return data?.session_id || null;
}

async function recordEvent(choice, scenario) {
  if (!state.sessionId) return;
  const balBefore = (state.history.length === 0
    ? STARTING_BALANCE
    : state.history[state.history.length - 1].balanceAfter);

  const cost = scenario.choices[choice].cost;
  const balAfter = Math.max(0, balBefore - cost);
  const balPctBefore = Math.round((balBefore / STARTING_BALANCE) * 100);
  const balPctAfter  = Math.round((balAfter  / STARTING_BALANCE) * 100);

  await apiPost('/events', {
    session_id: state.sessionId,
    student_id: state.studentId,
    scenario_round: scenario.day,
    simulation_id: SIMULATION_ID,
    option_selected: String.fromCharCode(65 + choice),
    time_to_decision_ms: state._choiceStartTime ? (Date.now() - state._choiceStartTime) : null,
    mind_changed: false,
    state_snapshot: {
      day: scenario.day,
      option_type: scenario.choices[choice].optionType,
      balance_pct_before: balPctBefore,
      balance_pct_after: balPctAfter,
      prior_impulsive_count: state.priorImpulsiveCount,
      low_balance_warning_shown: balBefore < 30,
    },
    presented_options: scenario.choices.map(c => c.optionType),
  });
}

async function completeSession() {
  if (!state.sessionId) return null;
  const duration = state.sessionStart ? Math.round((Date.now() - state.sessionStart) / 1000) : null;
  const data = await apiPost(`/sessions/${state.sessionId}/complete`, { duration_seconds: duration });
  return data;
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
const app = document.getElementById('app');

function render() {
  if (state.screen === 'join')  return renderJoin();
  if (state.screen === 'sim')   return renderSim();
  if (state.screen === 'score') return renderScore();
  if (state.screen === 'loading') return renderLoading();
}

function renderJoin() {
  app.innerHTML = `
    <div class="card join-screen">
      <div class="join-title">Ready to take<br>the challenge?</div>
      <div class="join-sub">
        You have $100. Five days. Five choices.<br>
        What you decide shows how your money brain works!
      </div>
      <input class="join-input" id="codeInput" type="text" maxlength="6"
        placeholder="Enter session code" autocomplete="off" spellcheck="false" />
      <div class="error-msg" id="codeError">That code doesn't match a session. Try again.</div>
      <button class="start-btn" onclick="joinWithCode()">Join Session</button>
      <div class="or-divider">or</div>
      <button class="solo-btn" onclick="startSolo()">Play on your own</button>
    </div>
  `;
}

function renderLoading() {
  app.innerHTML = `
    <div class="card">
      <div class="loading">
        <div class="spinner"></div>
        <div style="color:rgba(255,255,255,0.6);font-size:14px;">Setting up your session…</div>
      </div>
    </div>
  `;
}

function renderSim() {
  const scenarios = getScenarios();
  const scenario  = scenarios[state.day - 1];

  const progressDots = [1,2,3,4,5].map(d => {
    const cls = d < state.day ? 'dot done' : d === state.day ? 'dot active' : 'dot';
    return `<div class="${cls}"></div>`;
  }).join('');

  const choicesHtml = scenario.choices.map((c, i) => `
    <button class="choice-btn" onclick="makeChoice(${i})">
      <div class="choice-letter">${c.letter}</div>
      <div class="choice-content">
        <div class="choice-label">${c.label}</div>
        <div class="choice-detail">${c.detail}</div>
        <div class="choice-cost ${c.costType}">${c.costLabel}</div>
      </div>
    </button>
  `).join('');

  app.innerHTML = `
    <div class="balance-bar">
      <div>
        <div class="balance-label">Your Balance</div>
        <div class="balance-amount" id="balanceDisplay">$${state.balance}</div>
      </div>
      <div class="day-indicator">
        <div class="day-label">Day</div>
        <div class="day-number">${state.day} / 5</div>
      </div>
    </div>

    <div class="progress-dots">${progressDots}</div>

    <div class="card" id="simCard">
      <div class="day-tag ${scenario.tag}">${scenario.tagLabel}</div>
      <div class="scenario-title">${scenario.title}</div>
      <div class="scenario-text">${scenario.text}</div>
      <div class="context-pill">${scenario.contextPill}</div>

      <div class="outcome-card" id="outcomeCard">
        <div class="outcome-title" id="outcomeTitle"></div>
        <div class="outcome-text" id="outcomeText"></div>
      </div>

      <div class="choices" id="choicesContainer">
        ${choicesHtml}
      </div>

      <button class="next-btn" id="nextBtn" onclick="nextDay()">
        ${state.day < 5 ? 'Continue to Day ' + (state.day + 1) + ' →' : 'See My FLIQ Profile →'}
      </button>
    </div>
  `;

  // Start timing for this decision
  state._choiceStartTime = Date.now();
}

function renderScore() {
  const p = state.profile;
  if (!p) {
    app.innerHTML = `<div class="card score-screen">
      <div class="profile-badge">✅</div>
      <div class="profile-label">Week Complete</div>
      <div class="profile-sub">Your session has been recorded. Your educator will share your results.</div>
    </div>`;
    return;
  }

  const badges = {
    'Financial Starter': '🌱', 'Explorer': '🔭',
    'Builder': '🏗️', 'Thinker': '💡',
    'Emerging': '🌱', 'Developing': '🔭', 'Advancing': '🏗️',
    'Leading': '💡', 'Exceptional': '🌟',
  };

  const badge = badges[p.profile_label] || '✨';

  const traits = [
    { id: 'ic', name: 'Impulse Control', ...p.traits?.ic },
    { id: 'po', name: 'Planning',        ...p.traits?.po },
    { id: 'ra', name: 'Risk Awareness',  ...p.traits?.ra },
    { id: 'rb', name: 'Recovery',        ...p.traits?.rb },
  ];

  const traitCards = traits.map(t => {
    const label = t.label || 'Emerging';
    const cls   = label.toLowerCase().replace(' ', '-');
    const score = t.score ?? 0;
    const dots  = [0,1,2].map(i =>
      `<div class="trait-dot ${i < score ? `filled ${cls}` : ''}"></div>`
    ).join('');
    return `
      <div class="trait-card">
        <div class="trait-name">${t.name}</div>
        <div class="trait-label ${cls}">${label}</div>

      </div>`;
  }).join('');

  const profileDescriptions = {
    'Financial Starter': 'You\'re at the beginning of your financial intelligence journey. Every expert started here.',
    'Explorer':  'You\'re building awareness. Some strong instincts are showing — keep going.',
    'Builder':   'Your financial thinking is solid. You balance risk, patience, and recovery well.',
    'Thinker':   'You make intentional, context-aware financial decisions. That\'s rare.',
    'Developing': 'You\'re building awareness. Some strong instincts are showing — keep going.',
    'Advancing': 'Your financial thinking is solid. You balance risk, patience, and recovery well.',
  };

  app.innerHTML = `
    <div class="card score-screen">
      <div style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:8px;">Your FLIQ Profile</div>
      <div class="profile-badge">${badge}</div>
      <div class="profile-label">${p.profile_label}</div>
      <div class="profile-sub">${profileDescriptions[p.profile_label] || 'Your behavioral intelligence profile has been recorded.'}</div>

      <div class="trait-grid">${traitCards}</div>

      <div style="font-size:12px;color:rgba(255,255,255,0.3);margin-top:16px;line-height:1.6;">
        Your full behavioral report is available to your educator.<br>

      </div>

      <button class="play-again-btn" onclick="resetAndPlay()">Play Again</button>

  `;
}

// ══════════════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════════════
async function startSolo() {
  state.screen = 'loading';
  render();

  const studentId = await createStudent(state.cohortId);
  const sessionId = studentId ? await startSession(studentId) : null;

  state.studentId = studentId;
  state.sessionId = sessionId;
  state.balance   = STARTING_BALANCE;
  state.day       = 1;
  state.priorImpulsiveCount = 0;
  state.history   = [];
  state.sessionStart = Date.now();
  state.screen    = 'sim';
  render();
}

async function joinWithCode() {
  const code = document.getElementById('codeInput')?.value?.trim().toUpperCase();
  if (!code || code.length < 4) {
    const err = document.getElementById('codeError');
    if (err) err.classList.add('show');
    return;
  }

  // Resolve code to a real cohort_id
  try {
    const res = await fetch(`${API_BASE}/cohorts/by-code/${code}`);
    if (res.ok) {
      const data = await res.json();
      state.cohortId = data.cohort_id;
    }
    // If code lookup fails, proceed as solo (graceful fallback)
  } catch (e) { /* silent fallback */ }

  await startSolo();
}

// Auto-fill code from URL param ?code=XXXXXXXX
(function autoFillCode() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    const el = document.getElementById('codeInput');
    if (el) el.value = code.toUpperCase();
  }
})();

async function makeChoice(choiceIndex) {
  const scenarios = getScenarios();
  const scenario  = scenarios[state.day - 1];

  // Disable buttons
  const container = document.getElementById('choicesContainer');
  if (container) container.style.pointerEvents = 'none';

  // Highlight selected
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((b, i) => {
    if (i === choiceIndex) {
      b.style.borderColor = '#00B4D8';
      b.style.background  = 'rgba(0,180,216,0.12)';
    } else {
      b.style.opacity = '0.4';
    }
  });

  // Track impulsive behavior
  const optType = scenario.choices[choiceIndex].optionType;
  const isImpulsive = ['spend_nonessential', 'spend_social'].includes(optType)
    && (state.balance / STARTING_BALANCE) < 0.4;
  if (isImpulsive) state.priorImpulsiveCount++;

  // Update balance
  const cost = scenario.choices[choiceIndex].cost;
  const newBalance = Math.max(0, state.balance - cost);

  // Record event
  await recordEvent(choiceIndex, scenario);

  // Update state
  state.history.push({
    day: state.day,
    choice: choiceIndex,
    balanceBefore: state.balance,
    balanceAfter: newBalance,
  });
  state.balance = newBalance;

  // Update balance display
  const balDisplay = document.getElementById('balanceDisplay');
  if (balDisplay) balDisplay.textContent = `$${state.balance}`;

  // Show outcome
  const outcome = scenario.getOutcome(choiceIndex);
  const outcomeCard = document.getElementById('outcomeCard');
  const outcomeTitle = document.getElementById('outcomeTitle');
  const outcomeText  = document.getElementById('outcomeText');
  if (outcomeCard && outcome) {
    outcomeCard.className = `outcome-card show ${outcome.type}`;
    outcomeTitle.textContent = outcome.title;
    outcomeText.textContent  = outcome.text;
    outcomeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Show next button
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.classList.add('show');
}

async function nextDay() {
  if (state.day >= 5) {
    // Complete session
    state.screen = 'loading';
    render();
    const result = await completeSession();
    state.profile = result;
    state.screen  = 'score';
    render();
  } else {
    state.day++;
    state.screen = 'sim';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function resetAndPlay() {
  state.screen   = 'join';
  state.studentId = null;
  state.sessionId = null;
  state.balance  = STARTING_BALANCE;
  state.day      = 1;
  state.priorImpulsiveCount = 0;
  state.history  = [];
  state.profile  = null;
  render();
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
render();
</script>
